---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.reading_time %} · {{ page.reading_time }}{% endif %}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    {% if page.tags.size > 0 %}
    <p class="post-tags">{{ page.tags | join: ", " }}</p>
    {% endif %}
  </footer>
</article>
